<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Selayang Pandang Menopause</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles/style.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: #f7b3c5;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background-image: url("img/selayang-bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      padding: 34px 48px;
    }

    /* CONTENT PANEL */
    .content-panel {
      width: 62%;
      min-height: 640px;

      position: absolute;
      right: 70px;
      top: 185px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

      padding: 45px 55px 40px;
    }

    .content-panel h1 {
      font-size: 54px;
      line-height: 1.1;
      color: #8d0f49;
      font-weight: 800;
      text-align: center;
      margin-bottom: 48px;
    }

    .main-content {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    /* CENTER ILLUSTRATION */
    .circle-visual {
      width: 350px;
      height: 350px;
      flex: 0 0 350px;

      border-radius: 50%;
      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .circle-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(180, 50, 100, 0.25));
    }

    /* MENU CARDS */
    .info-menu {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 720px;
    }

    .info-card {
      min-height: 380px;
      padding: 20px 12px 24px;

      border: 2px solid rgba(224, 140, 165, 0.7);
      border-radius: 24px;

      background: rgba(255, 244, 246, 0.42);
      box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.28);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

      cursor: pointer;
      transition: 0.3s ease;
    }

    .info-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.55);
      box-shadow: 0 12px 24px rgba(180, 70, 110, 0.18);
    }

    .info-card h3 {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;

      color: #8d0f49;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 800;
      text-align: center;
      margin-bottom: 26px;
    }

    .icon-circle {
      width: 118px;
      height: 118px;
      border-radius: 50%;

      background: rgba(255, 247, 247, 0.65);
      border: 2px solid rgba(234, 178, 190, 0.75);
      box-shadow: 0 8px 14px rgba(184, 72, 110, 0.22);

      display: flex;
      align-items: center;
      justify-content: center;

      margin-bottom: 60px;
    }

    .icon-circle img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    .line {
      width: 78px;
      height: 12px;
      border-radius: 20px;
      background: #ee93ad;
      margin-bottom: auto;
    }

    .dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #d85a91;
      box-shadow: 0 4px 8px rgba(180, 50, 100, 0.2);
      margin-top: 52px;
    }

    .info-card:nth-child(3) .dot {
      background: #f08eaa;
    }

    .description {
      color: #9c0000;
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      margin-top: 28px;
      max-width: 900px;
    }

    /* RESPONSIVE */
    @media (max-width: 1400px) {
      .content-panel {
        width: 68%;
        right: 30px;
        top: 150px;
      }

      .content-panel h1 {
        font-size: 44px;
      }

      .circle-visual {
        width: 280px;
        height: 280px;
        flex-basis: 280px;
      }

      .info-card {
        min-height: 330px;
      }

      .icon-circle {
        width: 100px;
        height: 100px;
        margin-bottom: 45px;
      }

      .icon-circle img {
        width: 60px;
        height: 60px;
      }
    }

    @media (max-width: 1100px) {
      .page {
        background-position: left center;
        padding: 30px 24px 70px;
      }

      .content-panel {
        position: relative;
        top: auto;
        right: auto;

        width: 100%;
        min-height: auto;
        margin-top: 70px;

        background: rgba(255, 238, 242, 0.76);
        border-radius: 36px;
        padding: 45px 28px;
      }

      .main-content {
        flex-direction: column;
      }

      .info-menu {
        grid-template-columns: repeat(2, 1fr);
        max-width: 680px;
      }
    }

    @media (max-width: 650px) {
      .back-btn {
        width: 150px;
        height: 52px;
        font-size: 18px;
      }

      .content-panel h1 {
        font-size: 32px;
        margin-bottom: 35px;
      }

      .circle-visual {
        width: 220px;
        height: 220px;
        flex-basis: 220px;
      }

      .info-menu {
        grid-template-columns: 1fr;
      }

      .info-card {
        min-height: 280px;
      }

      .description {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <a href="index.html" class="back-btn">Back</a>

    <section class="content-panel">

      <h1>Selayang Pandang Menopause</h1>

      <div class="main-content">

        <div class="circle-visual">
          <img src="img/menopause-center.png" alt="Ilustrasi Menopause" />
        </div>

        <div class="info-menu">

          <a href="#" class="info-card">
            <h3>Definisi</h3>

            <div class="icon-circle">
              <img src="img/icon-definisi.png" alt="Definisi" />
            </div>

            <div class="line"></div>
            <div class="dot"></div>
          </a>

          <a href="#" class="info-card">
            <h3>Penyebab</h3>

            <div class="icon-circle">
              <img src="img/icon-penyebab.png" alt="Penyebab" />
            </div>

            <div class="line"></div>
            <div class="dot"></div>
          </a>

          <a href="#" class="info-card">
            <h3>Gejala & Keluhan</h3>

            <div class="icon-circle">
              <img src="img/icon-gejala.png" alt="Gejala dan Keluhan" />
            </div>

            <div class="line"></div>
            <div class="dot"></div>
          </a>

          <a href="#" class="info-card">
            <h3>Tindakan Pencegahan</h3>

            <div class="icon-circle">
              <img src="img/icon-pencegahan.png" alt="Tindakan Pencegahan" />
            </div>

            <div class="line"></div>
            <div class="dot"></div>
          </a>

        </div>

      </div>

      <p class="description">
        Pahami Menopause secara menyeluruh untuk langkah yang lebih tepat bagi diri anda
      </p>

    </section>

  </main>

</body>
</html>
